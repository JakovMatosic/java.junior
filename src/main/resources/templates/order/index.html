<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Orders</title>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
</head>
<body>
<div class="container-fluid my-2 px-3">
    <p><a th:href="@{/}">← Home</a></p>

    <h3 class="text-center">Order list</h3>

    <div class="d-flex flex-wrap justify-content-center align-items-center mb-3">
        <a th:href="@{/orders/addnew}" class="btn btn-primary btn-sm mr-2 mb-2">Add order</a>
        <a th:href="@{/orders(sort='alphabet')}" class="btn btn-sm mr-2 mb-2"
           th:classappend="${sort == 'alphabet'} ? 'btn-secondary' : 'btn-outline-secondary'">Sort by customer</a>
        <a th:href="@{/orders(sort='price')}" class="btn btn-sm mb-2"
           th:classappend="${sort == 'price'} ? 'btn-secondary' : 'btn-outline-secondary'">Sort by price</a>
    </div>

    <div class="table-responsive">
        <table class="table table-striped table-bordered table-sm">
            <thead class="thead-light">
            <tr>
                <th>Buyer name</th>
                <th>Status</th>
                <th>Order time</th>
                <th>Payment method</th>
                <th>Delivery address</th>
                <th>Contact number</th>
                <th>Note</th>
                <th>Items (Qty × Price)</th>
                <th>Order total</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orderList}">
                <td>
                    <span th:text="${order.buyer.title}"></span>
                    <span th:text="${order.buyer.firstName}"></span>
                    <span th:text="${order.buyer.lastName}"></span>
                </td>

                <td th:text="${order.stringOrderStatus}">Status</td>

                <td th:text="${#temporals.format(order.orderTime, 'dd.MM.yyyy. HH:mm')}">Time</td>

                <td th:text="${order.stringPaymentOption}">Payment</td>

                <td>
                    <span th:text="${order.deliveryAddress.street}"></span>
                    <span th:text="${order.deliveryAddress.homeNumber}"></span>,
                    <span th:text="${order.deliveryAddress.city}"></span>
                </td>

                <td th:text="${order.contactNumber}">Phone</td>
                <td th:text="${#strings.isEmpty(order.note)} ? '—' : ${order.note}">Note</td>

                <td class="text-left">
                    <ul class="list-unstyled mb-0 small">
                        <li th:each="item : ${order.orderItems}">
                            <b th:text="${item.name}">Item</b>:
                            <span th:text="${item.quantity}">0</span> ×
                            <span th:text="${item.price}">0.00</span>
                        </li>
                    </ul>
                </td>

                <td class="text-nowrap">
                    <strong th:text="${order.totalPrice}">0.00</strong>
                    <span th:text="${order.currency}">EUR</span>
                </td>

                <td class="text-nowrap">
                    <a th:href="@{/orders/showFormForUpdate/{id}(id=${order.orderNr})}" class="btn btn-primary btn-sm">Update</a>
                    <a th:href="@{/orders/deleteOrder/{id}(id=${order.orderNr})}"
                       class="btn btn-danger btn-sm">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
